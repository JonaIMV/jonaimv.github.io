<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Enlaces - TuCasa Caribe</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f4f4; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #1a6b72; color: white; font-weight: bold; cursor: pointer; border: none; }
        #result { background: #eef7f8; padding: 10px; font-size: 0.85em; word-break: break-all; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Generador de Enlaces 🚀</h2>
        <p>Escribe los IDs separados por comas:</p>
        <input type="text" id="ids" placeholder="Ej: 1,4,7">
        <p>Fecha de inicio (Hoy):</p>
        <input type="date" id="fecha">
        <button onclick="generar()">Generar y Copiar</button>
        <div id="result"></div>
    </div>

    <script>
        // Ponemos la fecha de hoy por defecto
        document.getElementById('fecha').valueAsDate = new Date();

        function generar() {
            const ids = document.getElementById('ids').value.replace(/\s+/g, '');
            const fecha = document.getElementById('fecha').value;
            const url = `https://tucasacariberealty.com/mis-opciones.html?ids=${ids}&exp=${fecha}`;
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerText = url;

            // Copiar al portapapeles automáticamente
            navigator.clipboard.writeText(url);
            alert("¡Enlace generado y copiado al portapapeles! Listo para pegar en WhatsApp.");
        }
    </script>
</body>
</html>
